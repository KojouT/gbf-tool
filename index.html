<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBF Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>グラブル編成支援ツール</h1>

    <p>Version 0.1 - 火属性対応版</p>

    <h2>武器編成</h2>

    <div id="weapon-list">
        武器選択欄はここに表示されます
    </div>

    <h2>召喚石</h2>

    <div id="summon-list">
        召喚石選択欄はここに表示されます
    </div>

    <h2>集計結果</h2>

    <label for="base-attack">基本攻撃力</label>

    <input type="number" id="base-attack" value="10000" min="0" step="1">

    <div id="result">
        集計結果はここに表示されます
    </div>

    <script src="script.js"></script>

</body>

</html>
